<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><title>世脉 WorldPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <h1 class="text-3xl font-bold">世脉 (WorldPulse)</h1>
    <div id="news-container" class="mt-6 space-y-4">正在加载数据...</div>
    <script>
        fetch('data/news.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('news-container');
                container.innerHTML = data.map(n => `
                    <div class="p-4 bg-slate-800 rounded-lg">
                        <h2 class="font-bold">${n.title}</h2>
                        <p class="text-sm text-gray-400">${n.summary}</p>
                    </div>`).join('');
            });
    </script>
</body>
</html>

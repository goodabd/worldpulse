name: Daily WorldPulse
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 显式赋予写入权限
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install feedparser google-generativeai requests
      - run: mkdir -p data && python scraper.py
      - name: Commit and Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          # 检查是否有变动，有则提交，无则跳过
          if [ -n "$(git status --porcelain)" ]; then
            git add data/news.json
            git commit -m "自动更新新闻数据"
            git push
          else
            echo "没有发现数据更新，跳过提交。"
          fi

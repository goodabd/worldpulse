name: Daily WorldPulse
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install feedparser google-generativeai requests
      - run: mkdir -p data && python scraper.py
      - name: Commit and Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/news.json
          # 这一步会自动判断：有改动则提交，无改动则跳过，不会再报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新新闻数据" && git push)

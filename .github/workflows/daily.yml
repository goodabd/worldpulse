name: Daily WorldPulse
on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00即北京时间08:00
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install feedparser google-generativeai requests
      - run: mkdir -p data && python scraper.py
      - name: Commit
        run: |
          git config user.name github-actions; git config user.email github-actions@github.com
          git add data/news.json; git commit -m "update data"; git push
